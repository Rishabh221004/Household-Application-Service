{% extends "customerBase.html" %}



{% block content %}

<div class="container mt-5">
    <h1 class="text-center">Create Request in {{ service.serviceName }}</h1>
    <form action="/customerDashboard/createRequest/{{ service.id }}" method="POST">
      <div class="form-group">
        <label for="serviceName" class="form-label">Service Name</label>
        <input type="text" class="form-control" id="serviceName" name="serviceName" value="{{ service.serviceName }}" readonly>
      </div>
      <div class="form-group">
        <label for="professional" class="form-label">Select Professional</label>
        <select class="form-select" aria-label="Default select example" name="professional">
          {% for professional in professionals %}
          <option value="{{ professional.username }}">{{ professional.username }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label for="description">Description of Service Request</label>
        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Create Request</button>
    </form>
  </div>

{% endblock %}
