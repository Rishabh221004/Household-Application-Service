{% extends "adminBase.html" %}

{% block content %}

<div class="container mt-5">
    <h1 class="text-center">Edit Service</h1>
    <form action="/adminDashboard/editService/{{ service.id }}" method="POST">
      <div class="form-group">
        <label for="serviceName">Service Name</label>
        <input type="text" class="form-control" id="serviceName" name="serviceName" required value="{{ service.serviceName }}">
      </div>
      <div class="form-group">
        <label for="serviceDescription">Service Description</label>
        <textarea class="form-control" id="serviceDescription" name="serviceDescription" required>{{ service.serviceDescription }}</textarea>
      </div>
      <div class="form-group">
        <label for="basePrice" >Base Price</label>
        <input type="number" class="form-control" id="basePrice" name="basePrice" required value="{{ service.basePrice }}">
      </div>
      <div class="form-group">
        <label for="time_required" >Time Required</label>
        <input type="text" class="form-control" id="timeRequired" name="timeRequired" required value="{{ service.timeRequired }}">
      </div>
      <button type="submit" class="btn btn-primary mt-3 mx-auto d-block">Update Service</button>
    </form>
  </div>
  {% endblock %}
