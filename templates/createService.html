{% extends "adminBase.html" %}

{% block content %}

  <div class="container mt-5">
    <h1 class="text-center">Create Service</h1>
    <form action="/adminDashboard/createService" method="POST">
      <div class="form-group">
        <label for="serviceName">Service Name</label>
        <input type="text" class="form-control" id="serviceName" name="serviceName" required>
      </div>
      <div class="form-group">
        <label for="serviceDescription">Service Description</label>
        <textarea class="form-control" id="serviceDescription" name="serviceDescription" required></textarea>
      </div>
      <div class="form-group">
        <label for="basePrice">Base Price</label>
        <input type="number" class="form-control" id="basePrice" name="basePrice" required>
      </div>
      <div class="form-group">
        <label for="timeRequired">Time Required</label>
        <input type="text" class="form-control" id="timeRequired" name="timeRequired" required>
      </div>
      <button type="submit" class="btn btn-primary mt-3 mx-auto d-block">Create Service</button>
    </form>
  </div>
{% endblock %}
