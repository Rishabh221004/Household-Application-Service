{% extends "customerBase.html" %}



{% block content %}

<section class="vh gradient-custom">
    <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <h1 class="text-center" style="color: #1a1a1a">Customer Register </h1>                          
            <form action="/customerRegister" method="POST" enctype="multipart/form-data">

                <!-- Username Input -->
                <div class="form-outline mb-4">  
                    <label class="form-label" for="form3Example3">Username</label>   
                    <input type="text" name="username" id="form3Example3" class="form-control form-control-lg" placeholder="Enter a Valid Username">
                    
                </div>

                <!-- Email Input -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example3">Email</label>
                    <input type="email" name="email" id="form3Example3" class="form-control form-control-lg" placeholder="Enter a Valid Email">
                    
                </div>

                <!-- Password Input --> 
                <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example4">Password</label>
                    <input type="password" name="password" id="form3Example4" class="form-control form-control-lg" placeholder="Enter a Valid Password">
                    
                </div>


                <!-- Mobile Number
                <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example4">Mobile Number</label>
                    <input type="text" name="mobile" id="form3Example4" class="form-control form-control-lg" placeholder="Enter Mobile Number">
                    
                </div> -->

                <!-- Address -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example4">Address</label>
                    <input type="text" name="address" id="form3Example4" class="form-control form-control-lg" placeholder="Enter Address">
                   
                </div>

                <!-- Pincode -->
                <div class="form-outline mb-4">
                    <label class="form-label" for="form3Example4">Pincode</label>
                    <input type="text" name="pincode" id="form3Example4" class="form-control form-control-lg" placeholder="Enter Pincode">   
                    
                </div>

                <div class="text-center text-lg-start mt-4 pt-2">
                    <button type="submit" class="btn btn-primary btn-lg" style="padding-left: 2.5rem; padding-right: 2.5rem;">Register</button>
                    <p class="small fw-bold mt-2 pt-1 mb-0">Already have an account? 
                    <br><a href="/login" class="link-danger">Login</a></p>
                </div>

            </form>
            </div>
        </div>
    </div>
</section>




{% endblock %}
