{% extends "customerBase.html" %}



{% block content %}

<div class="container mt-5">
    <h1 class="text-center">Edit Request in {{ serviceRequest.service.serviceName }}</h1>
    <form action="/customerDashboard/editRequest/{{ serviceRequest.id }}" method="POST">
      <div class="form-group">
        <label for="serviceName" class="form-label">Service Name</label>
        <input type="text" class="form-control" id="serviceName" name="serviceName" value="{{ serviceRequest.service.serviceName }}" readonly>
      </div>
      <div class="form-group">
        <label for="professional" class="form-label">Professional</label>
        <input type="text" class="form-control" id="professional" name="professional" value="{{ serviceRequest.professional.username }}" readonly>
      </div>
      <div class="mb-3">
        <label for="description">Description of Service Request</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ serviceRequest.description }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">Update Request</button>
    </form>
  </div>   





    

{% endblock %}
